<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Workplace Mind AI</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #070B14;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-border-hover: rgba(255, 255, 255, 0.18);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --purple-accent: #8b5cf6;
            --cyan-accent: #06b6d4;
            --danger: #ef4444;
            
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            
            --radius-md: 12px;
            --radius-lg: 20px;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 20% 80%, rgba(59, 130, 246, 0.15) 0%, transparent 50%);
            color: var(--text-main);
            overflow: hidden;
        }

        /* Ambient Glowing Background Orbs */
        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.35;
            pointer-events: none;
            z-index: 0;
            animation: pulseOrb 8s infinite alternate ease-in-out;
        }
        .orb-1 { top: -100px; right: -100px; width: 500px; height: 500px; background: var(--purple-accent); }
        .orb-2 { bottom: -100px; left: -100px; width: 500px; height: 500px; background: var(--primary); animation-delay: -3s; }

        @keyframes pulseOrb {
            0% { transform: scale(1); opacity: 0.25; }
            100% { transform: scale(1.2); opacity: 0.45; }
        }

        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 48px 40px;
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 400px;
            box-shadow: var(--glass-shadow);
            text-align: center;
            position: relative;
            z-index: 10;
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-logo {
            margin-bottom: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: rgba(139, 92, 246, 0.15);
            color: var(--purple-accent);
            border: 1px solid rgba(139, 92, 246, 0.3);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.2);
        }

        h2 {
            margin: 0 0 8px 0;
            font-weight: 800;
            font-size: 28px;
            letter-spacing: -0.5px;
            background: linear-gradient(180deg, #FFFFFF 0%, #BAC7D5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 15px;
            margin: 0 0 32px 0;
        }

        .form-group {
            margin-bottom: 22px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 600;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 14px 18px;
            border-radius: var(--radius-md);
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.04);
            color: white;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
            font-weight: 500;
            backdrop-filter: blur(10px);
        }

        input:focus {
            border-color: var(--purple-accent);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.25);
        }

        button {
            width: 100%;
            padding: 16px;
            border-radius: var(--radius-md);
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: linear-gradient(135deg, var(--primary), var(--purple-accent));
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 12px;
            box-shadow: 0 4px 20px var(--primary-glow);
        }

        button:hover {
            background: linear-gradient(135deg, #60a5fa, #a855f7);
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(139, 92, 246, 0.6);
        }

        button:active {
            transform: scale(0.98);
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            padding: 14px;
            border-radius: var(--radius-md);
            margin-bottom: 24px;
            font-size: 14px;
            border: 1px solid rgba(239, 68, 68, 0.3);
            font-weight: 600;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(239, 68, 68, 0.2);
        }

        .switch-link {
            margin-top: 32px;
            font-size: 14px;
            color: var(--text-muted);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 24px;
        }

        .switch-link a {
            color: var(--purple-accent);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .switch-link a:hover {
            color: #c084fc;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- Ambient Glow Orbs -->
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>

    <div class="auth-card">
        <div class="brand-logo">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
            </svg>
        </div>
        
        <h2>Create Account</h2>
        <p class="subtitle">Join Workplace Mind AI to monitor your mental well-being</p>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Create a strong password" required>
            </div>

            <button type="submit">Register Account</button>
        </form>

        <div class="switch-link">
            Already have an account? <a href="{{ url_for('login') }}">Log in here</a>
        </div>
    </div>

</body>
</html>
